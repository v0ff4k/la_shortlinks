version: '3.3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-php
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:80"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: ls_sl-mysql
    environment:
      MYSQL_DATABASE: shortener_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: ls_sl-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
