version: '3.6'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-php
    working_dir: /var/www
    volumes:
      - .:/var/www:rw
    depends_on:
      - mysql # Используем простой массив, без condition
      - redis
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      # Другие env переменные

  nginx:
    image: nginx:stable-alpine
    container_name: ls_sl-nginx
    ports:
      - "28000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app # nginx ждёт app
    # НЕ используем healthcheck для nginx, если он просто проксирует

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-q-worker
    working_dir: /var/www
    command: php artisan queue:work
    depends_on:
      - redis
      - mysql
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-scheduler
    working_dir: /var/www
    command: |
      sh -c "sleep 10 && while true; do php artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql

  mysql:
    # при новой ОС, выбрать mariadb:latest / mariadb:10.6 / mysql:latest / mysql:8.0 / mysql:6.7
    image: mysql:8.0
    container_name: ls_sl-mysql # Оставляем, нужно
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-default_root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-shortener_db}
      # Убираем MYSQL_USER/PASSWORD, пусть Laravel использует root или создаст пользователя сам при первой миграции
      #      MYSQL_USER: ${DB_USERNAME:-root}
      #      MYSQL_PASSWORD: ${DB_PASSWORD:-default_root_password}
    volumes:
      # Локальная папка для данных (легко бэкапить и смотреть)
      - ./docker/mysql/data:/var/lib/mysql
      # Конфиги
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      # Init-скрипты
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      # Временные файлы
      - ./docker/mysql/tmp:/tmp/mysql
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-authentication-plugin=mysql_native_password"
    # healthcheck остаётся
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: ls_sl-redis
#    ports:
#      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mysql_data: