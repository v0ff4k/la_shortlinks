version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-php
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
      - nginx # Ждём nginx
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      # Другие env переменные

  nginx:
    image: nginx:stable-alpine
    container_name: ls_sl-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf # Нужно создать
    depends_on:
      - app

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-q-worker
    working_dir: /var/www
    command: php artisan queue:work
    depends_on:
      - redis
      - mysql
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ls_sl-scheduler
    working_dir: /var/www
    command: |
      sh -c "sleep 10 && while true; do php artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql

  mysql:
    image: mysql:8.0
    container_name: ls_sl-mysql
    environment:
      MYSQL_DATABASE: shortener_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-default_root_password} # Используем env var
      MYSQL_USER: shortener_app
      MYSQL_PASSWORD: ${DB_PASSWORD:-default_password} # Используем env var
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: ls_sl-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data: